    - "15-1252"   # Software Developers — primary (ML Engineer / AI Software Engineer track)
    - "15-1211"   # Computer Systems Analysts — parallel track (IT/ERP/AMS, still active)
    - "13-1111"   # Management Analysts — fallback (BSA / consulting)

