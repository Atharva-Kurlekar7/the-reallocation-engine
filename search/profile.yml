  # 15-1252: Software Developers — $133,080 median, Job Zone 4 — maps to ML Engineer / AI Software Engineer
  # 15-1211: Computer Systems Analysts — $103,790 median, Job Zone 3 — IT/ERP track (parallel)
  confirmed_soc:
