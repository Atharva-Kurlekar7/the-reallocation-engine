    Applied AI Engineer or Gen AI Developer at a funded company (Series B+) —
    building LLM-powered products, RAG pipelines, or AI-integrated enterprise tools.
    Secondarily open to IT/ERP Systems Analyst roles where platform depth
    (Oracle OTM, ServiceNow, SQL) is the differentiator. Sponsorship is non-negotiable
    on both tracks.

  excluded_soc:
